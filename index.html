<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookKeep — Booking Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #0f0f23 0%, #16213e 100%);
      color: #e6e6e6;
      min-height: 100vh;
      padding-bottom: 60px;
    }
    .mono { font-family: 'DM Mono', monospace; }
    .muted { color: #8892b0; font-size: 12px; }

    /* Nav */
    .navbar {
      background: rgba(15,15,35,.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #1f2937;
      padding: 14px 20px;
      position: sticky; top: 0; z-index: 10;
    }
    .nav-inner { max-width: 720px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 18px; letter-spacing: -.5px; }
    .nav-btns { display: flex; gap: 4px; }
    .nav-btn {
      padding: 9px 18px; border-radius: 8px; border: none;
      font-weight: 600; font-size: 13px; cursor: pointer;
      background: transparent; color: #8892b0; transition: all .2s;
    }
    .nav-btn.active { background: #e94560; color: #fff; }

    /* Content */
    #app { max-width: 720px; margin: 0 auto; padding: 24px 16px; }

    /* Stat cards */
    .stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
    .stat-card {
      background: #1a1a2e; border-radius: 14px; padding: 18px 22px;
      border-left: 4px solid; min-width: 170px; flex: 1;
    }
    .stat-label { font-size: 11px; color: #8892b0; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 5px; }
    .stat-value { font-size: 24px; font-weight: 700; font-family: 'DM Mono', monospace; }

    /* Mini bar */
    .mini-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; background: #111; margin-bottom: 12px; }
    .mini-bar div { transition: width .4s; }

    .all-time { margin: 10px 0 16px; text-transform: uppercase; letter-spacing: 1px; }

    /* Month selector */
    .month-selector { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .month-selector select, select { 
      padding: 10px 14px; border-radius: 10px; border: 1px solid #333;
      background: #1a1a2e; color: #e6e6e6; font-size: 14px; outline: none;
      font-family: 'Outfit', sans-serif;
    }

    /* Transactions */
    .tx-list { margin-top: 10px; }
    .tx-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; background: #1a1a2e; border-radius: 10px; margin-bottom: 8px;
      transition: transform .15s;
    }
    .tx-row:hover { transform: translateX(4px); }
    .tx-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .tx-info { flex: 1; }
    .tx-desc { font-weight: 600; font-size: 14px; }
    .tx-meta { font-size: 12px; }
    .tx-amount { font-family: 'DM Mono', monospace; font-weight: 700; font-size: 15px; margin-right: 8px; white-space: nowrap; }
    .tx-del {
      background: transparent; border: 1px solid #333; color: #ff5252;
      border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px;
    }
    .empty { text-align: center; padding: 40px; color: #555; }
    .loading { text-align: center; padding: 60px; color: #8892b0; font-size: 16px; }

    /* Form */
    .form-card {
      background: #1a1a2e; border-radius: 16px; padding: 28px;
      max-width: 480px; margin: 0 auto;
    }
    .form-card h2 { margin-bottom: 20px; font-size: 20px; }
    .type-toggle { display: flex; gap: 8px; margin-bottom: 20px; }
    .type-btn {
      flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333;
      background: transparent; color: #8892b0; font-weight: 700; font-size: 14px; cursor: pointer;
    }
    .type-btn.active-income { background: #00e676; color: #0f0f23; border-color: #00e676; }
    .type-btn.active-expense { background: #ff5252; color: #fff; border-color: #ff5252; }
    .field-label { display: block; font-size: 11px; color: #8892b0; text-transform: uppercase; letter-spacing: 1px; margin: 4px 0; }
    input[type="date"], input[type="text"], input[type="number"], .form-card select {
      width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #333;
      background: #1a1a2e; color: #e6e6e6; font-size: 14px; outline: none;
      margin-bottom: 12px; font-family: 'Outfit', sans-serif;
    }
    .amount-input { font-family: 'DM Mono', monospace !important; font-size: 18px !important; }

    /* Buttons */
    .btn-primary {
      display: block; width: 100%; padding: 14px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #e94560, #c81d4e); color: #fff;
      font-weight: 700; font-size: 15px; cursor: pointer; letter-spacing: .5px; margin-top: 6px;
    }
    .btn-primary:disabled { background: #333; cursor: not-allowed; }
    .btn-outline {
      display: block; width: 100%; margin-top: 10px; padding: 14px; border-radius: 10px;
      border: 1px solid #e94560; background: transparent; color: #e94560;
      font-weight: 700; font-size: 14px; cursor: pointer;
    }

    /* Report */
    .report-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 18px; }
    .report-header h2 { font-size: 20px; }
    .breakdown-card { background: #1a1a2e; border-radius: 14px; padding: 20px; margin-bottom: 16px; }
    .breakdown-card h3 { margin-bottom: 14px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
    .cat-item { margin-bottom: 10px; }
    .cat-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
    .cat-bar-bg { height: 6px; border-radius: 3px; background: #111; }
    .cat-bar { height: 100%; border-radius: 3px; transition: width .4s; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 10px; color: #8892b0; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .8px; border-bottom: 1px solid #333; }
    td { padding: 8px 10px; border-bottom: 1px solid #1f2937; }

    /* Toast */
    #toast {
      position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%);
      padding: 12px 24px; border-radius: 10px; font-weight: 600; font-size: 14px;
      transition: bottom .3s; z-index: 100; white-space: nowrap;
    }
    #toast.show { bottom: 24px; }

    @media (max-width: 520px) {
      .stat-row { flex-direction: column; }
      .stat-card { min-width: 0; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <div class="logo"><span>📒</span> BookKeep</div>
      <div class="nav-btns">
        <button class="nav-btn active" data-view="dashboard">Dashboard</button>
        <button class="nav-btn" data-view="add">+ Add</button>
        <button class="nav-btn" data-view="report">Report</button>
      </div>
    </div>
  </nav>
  <div id="app"></div>
  <div id="toast"></div>
  <script src="src/app.js"></script>
</body>
</html>
